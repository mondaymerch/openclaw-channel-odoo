name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      # tsx is the runner for our node:test suite. It's not in our
      # devDependencies (would force a lockfile regen, which Mac can't do
      # cleanly due to openclaw's optional Discord native-binding deps).
      # Installing it --no-save here keeps the lockfile pristine.
      - run: npm install --no-save tsx@^4.21.0

      - run: npm run lint

      - run: npm test

      - run: npm run build
