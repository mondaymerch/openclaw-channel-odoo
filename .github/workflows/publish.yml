name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run build

      # Route pre-releases (semver suffix with `-`, e.g. 0.4.0-beta) to the
      # `beta` dist-tag so `npm install <pkg>` keeps installing the latest
      # stable. Stable versions publish to the default `latest` dist-tag.
      - name: Publish to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            echo "Publishing pre-release $VERSION to dist-tag beta"
            npm publish --access public --tag beta
          else
            echo "Publishing stable $VERSION to dist-tag latest"
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
